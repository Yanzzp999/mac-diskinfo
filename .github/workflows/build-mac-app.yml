name: Build and Release Mac App
on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release Mac App
    runs-on: macos-latest
    # Trigger the workflow only if the commit message contains "[release]" or "[build]"
    if: "contains(github.event.head_commit.message, '[release]') || contains(github.event.head_commit.message, '[build]')"
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # electron-builder might need python for some native modules
      - name: Setup Python (if needed for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Artifacts
          path: |
            release/*.dmg
            release/*.zip
            release/*.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release 1.0.${{ github.run_number }}"
          body: "Automated release triggered by commit: ${{ github.event.head_commit.message }}"
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
