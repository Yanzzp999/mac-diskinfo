name: Build and Release Mac App
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release Mac App
    runs-on: macos-latest
    # Allow manual runs, and keep push-triggered releases gated by commit message.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]') ||
      contains(github.event.head_commit.message, '[build]')
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # electron-builder might need python for some native modules
      - name: Setup Python (if needed for node-gyp)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build App
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Packaged App
        run: npm run verify:packaged
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Mac-App-Artifacts
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
            release/**/*.app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v1.0.${{ github.run_number }}"
          title="Release 1.0.${{ github.run_number }}"
          notes_file="$RUNNER_TEMP/release-notes.md"

          cat > "$notes_file" <<EOF
          Automated release generated by GitHub Actions.
          Event: ${{ github.event_name }}
          Commit: ${{ github.sha }}
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml --clobber
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml --title "$title" --notes-file "$notes_file"
          fi
